<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4fb8b2"/>
      <stop offset="100%" stop-color="#7ed3bf"/>
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#173a40"/>
      <stop offset="100%" stop-color="#2f6a4a"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background circle with gradient -->
  <circle cx="100" cy="100" r="96" fill="url(#grad2)" opacity="0.95"/>
  <circle cx="100" cy="100" r="96" fill="none" stroke="url(#grad)" stroke-width="2.5" opacity="0.6"/>

  <!-- Inner glow ring -->
  <circle cx="100" cy="100" r="82" fill="none" stroke="url(#grad)" stroke-width="0.8" opacity="0.25"/>

  <!-- Left brace { -->
  <path
    d="M72 52 C60 52, 56 58, 56 68 L56 88 C56 96, 48 100, 48 100 C48 100, 56 104, 56 112 L56 132 C56 142, 60 148, 72 148"
    stroke="url(#grad)" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" fill="none" filter="url(#glow)"/>

  <!-- Right brace } -->
  <path
    d="M128 52 C140 52, 144 58, 144 68 L144 88 C144 96, 152 100, 152 100 C152 100, 144 104, 144 112 L144 132 C144 142, 140 148, 128 148"
    stroke="url(#grad)" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" fill="none" filter="url(#glow)"/>

  <!-- FC letters centered -->
  <!-- F -->
  <g fill="white" font-family="system-ui" filter="url(#glow)">
    <rect x="80" y="82" width="5.5" height="36" rx="2.5"/>
    <rect x="80" y="82" width="18" height="5.5" rx="2.5"/>
    <rect x="80" y="97" width="14" height="5" rx="2"/>
  </g>

  <!-- C -->
  <path
    d="M107 86 C114 80, 124 82, 126 90"
    stroke="white" stroke-width="5.5" stroke-linecap="round" fill="none" opacity="0.95"/>
  <path
    d="M107 114 C114 120, 124 118, 126 110"
    stroke="white" stroke-width="5.5" stroke-linecap="round" fill="none" opacity="0.95"/>
  <path
    d="M107 86 L107 114"
    stroke="white" stroke-width="5.5" stroke-linecap="round" fill="none" opacity="0.95"/>

  <!-- Dot accent top-right -->
  <circle cx="158" cy="46" r="5" fill="url(#grad)" opacity="0.8"/>
  <circle cx="42" cy="154" r="3.5" fill="url(#grad)" opacity="0.5"/>
</svg>
